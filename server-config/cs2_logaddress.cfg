// ── CS2 log forwarding to cs2-log-backend ───────────────────
// Place in csgo/cfg/ and exec from server.cfg or autoexec.cfg.
// Replace <BACKEND_URL> and <TOKEN> with your deployment.

log on
mp_logdetail 3
mp_logdetail_items 1
sv_log_onefile 0

// Send every log line to the backend (CS2 POSTs the raw log body).
// Optional Authorization header matches LOG_AUTH env var on the backend.
logaddress_add_http "https://<BACKEND_URL>/log/<TOKEN>"

// If your build supports it, set the auth header (same value as LOG_AUTH).
// logaddress_add_http_header "Authorization: <LOG_AUTH>"
